<svg xmlns="http://www.w3.org/2000/svg" width="340" height="268"
     viewBox="0 0 340 268" role="img" aria-label="Top Languages">

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#12121F"/>
    </linearGradient>
    <filter id="titleGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- fondo -->
  <rect width="340" height="268" rx="12" fill="url(#bgGrad)" stroke="#2A2A3E" stroke-width="1.5"/>

  <!-- título -->
  <text x="24" y="28" fill="#00F5FF" font-family="'Courier New', monospace"
        font-size="14" font-weight="700" filter="url(#titleGlow)">◈ Top Languages</text>
  <line x1="24" y1="34" x2="316" y2="34" stroke="#2A2A3E" stroke-width="1"/>

  
    <!-- Jupyter Notebook -->
    <defs>
      <filter id="glow0" x="-20%" y="-80%" width="140%" height="260%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <text x="24" y="53" fill="#E0E0E0" font-family="'Courier New', monospace"
          font-size="12" font-weight="600">Jupyter Notebook</text>
    <text x="316" y="53" fill="#00F5FF" font-family="'Courier New', monospace"
          font-size="11" text-anchor="end" font-weight="700">37.6%</text>
    <!-- track -->
    <rect x="24" y="59" width="292" height="8"
          rx="4" fill="#1E1E2E"/>
    <!-- barra activa -->
    <rect x="24" y="59" width="110" height="8"
          rx="4" fill="#00F5FF" filter="url(#glow0)" opacity="0.9">
      <animate attributeName="width" from="0" to="110" dur="0.8s"
               begin="0.0s" fill="freeze" calcMode="spline"
               keySplines="0.4 0 0.2 1" keyTimes="0 1"/>
    </rect>
